<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LingoChunk Recorder</title>
  <link rel="stylesheet" href="recorder.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="popup">
  <header class="popup-header">
    <img src="icons/icon-32.png" alt="" width="20" height="20" />
    <strong>LingoChunk Recorder</strong>
  </header>

  <!-- idle -->
  <div id="state-idle" hidden>
    <button id="rec-tab-btn" class="btn btn-record popup-btn" type="button" hidden>
      <span class="record-dot"></span>
      <span id="rec-tab-label">Record mic + this tab</span>
    </button>
    <button id="rec-mic-btn" class="btn btn-record popup-btn popup-btn-secondary" type="button">
      <span class="record-dot"></span>
      Record microphone
    </button>
    <p id="idle-hint" class="hint"></p>
  </div>

  <!-- recording -->
  <div id="state-recording" hidden>
    <div class="popup-recording-row">
      <span class="rec-live-dot"></span>
      <span id="popup-timer" class="timer">0:00</span>
    </div>
    <button id="stop-btn" class="btn btn-record popup-btn" type="button">■ Stop recording</button>
    <p class="hint">Recording continues if you close this popup.</p>
  </div>

  <!-- stopped: offer to send right here -->
  <div id="state-saved" hidden>
    <p class="popup-saved">Saved on this device.</p>
    <label class="checkbox-row">
      <input id="notify-check" type="checkbox" />
      <span>Email me when it's ready</span>
    </label>
    <button id="send-btn" class="btn btn-record popup-btn" type="button">Send to LingoChunk</button>
    <p class="hint">Or keep it on this device — it stays in the recorder.</p>
  </div>

  <!-- sent -->
  <div id="state-sent" hidden>
    <p class="popup-saved">Sent — processing on LingoChunk.</p>
    <p id="sent-hint" class="hint"></p>
  </div>

  <p id="popup-error" class="error" hidden></p>

  <footer class="popup-footer">
    <button id="open-recorder" class="btn btn-small" type="button">Open recorder</button>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
